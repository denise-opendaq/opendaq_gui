name: Windows Installer Build

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        choco install cmake ninja nsis -y

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.8.0'
        arch: 'win64_msvc2022_64'
        modules: 'qtcharts'
        cache: 'true'

    - name: Configure (Release)
      shell: pwsh
      run: |
        $env:CMAKE_PREFIX_PATH = "$env:Qt6_DIR"
        cmake --preset opendaq-qt-gui -DCMAKE_BUILD_TYPE=Release

    - name: Build (Release)
      shell: pwsh
      run: |
        cmake --build --preset opendaq-qt-gui --config Release

    - name: Package with CPack (NSIS)
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path build\\dist\\windows | Out-Null
        cpack -G NSIS -C Release -B build\\dist\\windows --config build\\CPackConfig.cmake

    - name: Upload installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenDAQ-Qt-GUI-Windows-Installer
        path: build/dist/windows/OpenDAQ.Qt.GUI-*-windows-*.exe
        retention-days: 30

    - name: Upload installer to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: build/dist/windows/OpenDAQ.Qt.GUI-*-windows-*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

