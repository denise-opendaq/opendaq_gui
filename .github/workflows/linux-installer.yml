name: Linux DEB Build

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-linux-installer:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            artifact-name: OpenDAQ-Qt-GUI-Linux-x64-DEB
          - runner: ubuntu-24.04-arm
            artifact-name: OpenDAQ-Qt-GUI-Linux-ARM-DEB

    runs-on: ${{ matrix.runner }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          ninja-build \
          build-essential \
          gcc-12 \
          g++-12 \
          qt6-base-dev \
          qt6-base-dev-tools \
          libqt6core6 \
          libqt6gui6 \
          libqt6widgets6 \
          libqt6charts6-dev \
          libxkbcommon-dev \
          dpkg-dev \
          fakeroot \
          mono-complete \
          libx11-dev \
          libxrandr-dev \
          libxcursor-dev \
          libxi-dev \
          libudev-dev \
          libfreetype6-dev

        # Set GCC 12 as default
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 100
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 100
        sudo update-alternatives --install /usr/bin/cc cc /usr/bin/gcc-12 100
        sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-12 100

    - name: Configure (Release)
      run: |
        cmake --preset opendaq-qt-gui -DCMAKE_BUILD_TYPE=Release -DEXTRA_MODULE_PATH="../lib/opendaq-qt-gui"

    - name: Build (Release)
      run: cmake --build --preset opendaq-qt-gui --config Release

    - name: Package with CPack (DEB)
      run: |
        mkdir -p build/dist/linux
        cpack -G DEB -C Release -B build/dist/linux --config build/CPackConfig.cmake

    - name: Upload DEB artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact-name }}
        path: build/dist/linux/OpenDAQ.Qt.GUI-*-linux-*.deb
        retention-days: 30

    - name: Upload DEB to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: build/dist/linux/OpenDAQ.Qt.GUI-*-linux-*.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
